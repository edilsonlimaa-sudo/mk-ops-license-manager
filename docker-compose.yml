# ===========================================
# MK-Ops License Manager - Docker Compose
# ===========================================
# Este compose usa variáveis de ambiente para configuração.
# 
# VARIÁVEIS OBRIGATÓRIAS (configure no Portainer):
#   - POSTGRES_PASSWORD (senha do PostgreSQL)
#   - NEXT_PUBLIC_APP_URL (URL pública da aplicação)
#
# VARIÁVEIS OPCIONAIS (têm defaults):
#   - POSTGRES_USER (default: postgres)
#   - POSTGRES_DB (default: mkops_licenses)
#   - NODE_ENV (default: production)
#   - TZ (default: America/Sao_Paulo)
#
# REDE:
#   - Usa a rede 'internal_network' existente no servidor
#   - Compartilhada com Nginx Proxy Manager, Portainer e outros serviços
#
# Veja: portainer.env.template para exemplo de configuração
# ===========================================

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: mkops_licenses_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mkops_licenses}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mkops_licenses"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Expor porta APENAS para desenvolvimento local
    # Em produção com Portainer, comente essa linha:
    # ports:
    #   - "5432:5432"

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mkops_licenses_app
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mkops_licenses}
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - PORT=3000
    # Porta NÃO exposta no host - acesso exclusivo via Nginx Proxy Manager
    # NPM deve usar: http://mkops_licenses_app:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"

# ===========================================
# Networks
# ===========================================
# Usa a rede 'internal_network' existente no servidor
# Esta é a mesma rede onde o Nginx Proxy Manager está conectado
# Subnet: 172.26.0.0/24
networks:
  internal_network:
    external: true
    name: internal_network

volumes:
  pgdata:
    driver: local
