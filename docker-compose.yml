# ===========================================
# MK-Ops License Manager - Docker Compose (DEBUG MODE)
# ===========================================
# ⚠️ VERSÃO COM VALORES HARDCODED PARA DEBUG LOCAL
# 
# Quando subir no Portainer, use as variáveis de ambiente.
# Veja: PORTAINER.md para guia completo de configuração
# ===========================================

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: mkops_licenses_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: mkops_licenses
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: America/Sao_Paulo
    volumes:
      - mkops_pgdata:/var/lib/postgresql/data
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mkops_licenses"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Expor porta APENAS para desenvolvimento local
    # Em produção com Portainer, comente essa linha:
    # ports:
    #   - "5432:5432"

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mkops_licenses_app
    restart: unless-stopped
    environment:
      # Valores hardcoded para debug - SUBSTITUA depois no Portainer
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/mkops_licenses
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - PORT=3000
    # Porta exposta para DEBUG LOCAL - remova no Portainer
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"

# ===========================================
# Networks
# ===========================================
# TEMPORÁRIO: Usando bridge local para debug
# No Portainer, troque para 'external: true' e use 'internal_network'
networks:
  internal_network:
    driver: bridge

volumes:
  mkops_pgdata:
    driver: local
