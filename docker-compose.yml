# ===========================================
# MK-Ops License Manager - Docker Compose
# ===========================================
# Configure as variáveis de ambiente no Portainer.
# 
# Para desenvolvimento local:
# 1. Copie .env.example para .env
# 2. Ajuste os valores conforme necessário
# 
# Veja PORTAINER.md para guia completo de configuração em produção
# ===========================================

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: mkops_licenses_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mkops_licenses}
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - mkops_pgdata:/var/lib/postgresql/data
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mkops_licenses}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Expor porta APENAS para desenvolvimento local
    # Em produção com Portainer, comente essa linha:
    # ports:
    #   - "5432:5432"

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mkops_licenses_app
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - PORT=${PORT:-3000}
    # Porta NÃO exposta - acesso APENAS via Nginx Proxy Manager
    # ports:
    #   - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"

# ===========================================
# Networks
# ===========================================
# Usando a rede EXTERNA 'internal_network' (mesma do Nginx Proxy Manager)
networks:
  internal_network:
    external: true

volumes:
  mkops_pgdata:
    driver: local
